<div style="padding:0.75rem">
    <h2 style="font-size:14px;margin-bottom:12px">{% if definition %}Edit Definition{% else %}New Definition{% endif %}</h2>

    <form id="def-edit-form" onsubmit="return false;">
        {% csrf_token %}

        <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Name</label>
        <input type="text" name="name" required value="{{ definition.name|default:'' }}"
            style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);margin-bottom:12px">

        <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Description</label>
        <input type="text" name="description" value="{{ definition.description|default:'' }}"
            style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);margin-bottom:12px">

        <div style="display:flex;gap:12px;margin-bottom:12px">
            <div style="flex:1">
                <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Model</label>
                <select name="model" id="model-select" onchange="updateMcpToolsForModel()" style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text)">
                    {% for group_name, group_models in model_groups %}
                    <optgroup label="{{ group_name }}">
                    {% for value, label in group_models %}
                    <option value="{{ value }}" {% if definition.data.model == value %}selected{% elif not definition and value == 'sonnet' %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                    </optgroup>
                    {% endfor %}
                </select>
            </div>
            <div style="flex:1">
                <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Effort</label>
                <select name="effort" style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text)">
                    <option value="low" {% if definition.data.effort == 'low' %}selected{% endif %}>low</option>
                    <option value="medium" {% if definition.data.effort == 'medium' %}selected{% endif %}>medium</option>
                    <option value="high" {% if not definition or definition.data.effort == 'high' %}selected{% endif %}>high</option>
                    <option value="xhigh" {% if definition.data.effort == 'xhigh' %}selected{% endif %}>xhigh</option>
                </select>
            </div>
            <div style="flex:1">
                <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Timeout (min)</label>
                <input type="number" name="timeout_min" min="1" max="480" value="{% widthratio definition.data.timeout_s|default:3600 60 1 %}"
                    style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text)"
                    id="timeout-min-input">
            </div>
        </div>

        <label id="mcp-tools-label" style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">MCP Tools</label>
        <div id="mcp-tools-container" style="margin-bottom:12px">
            {% for key, label in mcp_choices %}
            <label class="mcp-tool-label" data-mcp-key="{{ key }}" style="display:inline;font-size:13px;color:var(--text);margin-right:16px">
                <input type="checkbox" name="mcp_tools" value="{{ key }}" {% if definition and key in definition.data.mcp_tools %}checked{% elif not definition and key == 'lxr' %}checked{% endif %}> {{ label }}
            </label>
            {% endfor %}
            {% for key, label in remote_extra_choices %}
            <label class="mcp-tool-label" data-mcp-key="{{ key }}" data-remote-only="1" style="display:none;font-size:13px;color:var(--text);margin-right:16px">
                <input type="checkbox" name="mcp_tools" value="{{ key }}" {% if definition and key in definition.data.mcp_tools %}checked{% endif %}> {{ label }}
            </label>
            {% endfor %}
        </div>

        <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">System Prompt</label>
        <select name="system_prompt_group_id" id="sp-select"
            onchange="updateSpPreview()"
            style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);margin-bottom:8px">
            {% for sp in sysprompts %}
            <option value="{{ sp.group_id }}" {% if definition and definition.data.system_prompt_group_id == sp.group_id|stringformat:'s' %}selected{% endif %}>{{ sp.name }} v{{ sp.version }}</option>
            {% endfor %}
        </select>
        <div id="sp-preview" class="prompt-content" style="font-size:12px;max-height:150px;overflow-y:auto;margin-bottom:12px"></div>

        <div style="display:flex;gap:8px;align-items:center">
            <button type="button" class="btn" onclick="saveDef('{{ definition.id|default:'' }}')">Save</button>
            <button type="button" class="btn" style="background:transparent;color:var(--grey);border:1px solid var(--border)" onclick="window.location.reload()">Cancel</button>
            {% if definition %}<button type="button" class="btn" style="background:#7f1d1d;margin-left:auto" onclick="deleteDef('{{ definition.id }}')">Delete</button>{% endif %}
        </div>
    </form>
</div>

<script>
var _spContents = JSON.parse('{{ sp_contents_json|escapejs }}');
var _remoteModels = JSON.parse('{{ remote_models_json|escapejs }}');
var _remoteFixedMcp = JSON.parse('{{ remote_fixed_mcp_json|escapejs }}');

function updateSpPreview() {
    var sel = document.getElementById('sp-select');
    var gid = sel.value;
    var el = document.getElementById('sp-preview');
    el.textContent = _spContents[gid] || '';
}
updateSpPreview();

function updateMcpToolsForModel() {
    var modelSel = document.getElementById('model-select');
    var isRemote = modelSel && _remoteModels.indexOf(modelSel.value) >= 0;
    var labelEl = document.getElementById('mcp-tools-label');
    var container = document.getElementById('mcp-tools-container');
    if (!container) return;

    // Toggle the section heading to make the constraint visible.
    if (labelEl) {
        labelEl.textContent = isRemote
            ? 'MCP Tools (fixed — configured on remote worker)'
            : 'MCP Tools';
    }

    container.querySelectorAll('label.mcp-tool-label').forEach(function(lbl) {
        var key = lbl.getAttribute('data-mcp-key');
        var remoteOnly = lbl.getAttribute('data-remote-only') === '1';
        var cb = lbl.querySelector('input[type=checkbox]');
        if (!cb) return;
        if (isRemote) {
            var isFixed = _remoteFixedMcp.indexOf(key) >= 0;
            if (isFixed) {
                cb.checked = true;
                cb.disabled = true;
                lbl.style.display = '';
                lbl.style.opacity = '0.75';
                lbl.title = 'Always on for remote-dispatched models (configured on remote worker)';
            } else {
                // Hide non-applicable tools entirely to keep the UI honest.
                cb.checked = false;
                cb.disabled = true;
                lbl.style.display = 'none';
            }
        } else if (remoteOnly) {
            // Mac-only tools have no local-execution config in
            // MCP_SERVERS — selecting them for a claude/gemini def
            // would silently fail at .mcp.json write time. Hide them
            // in non-remote mode and ensure they aren't carried over
            // from a previous remote-model selection.
            cb.checked = false;
            cb.disabled = true;
            lbl.style.display = 'none';
        } else {
            cb.disabled = false;
            lbl.style.display = '';
            lbl.style.opacity = '';
            lbl.title = '';
        }
    });
}
updateMcpToolsForModel();

function deleteDef(defId) {
    if (!confirm('Delete this definition?')) return;
    fetch('{% url "codoc:definition_delete" "00000000-0000-0000-0000-000000000000" %}'.replace('00000000-0000-0000-0000-000000000000', defId), {
        method: 'POST',
        headers: {'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value},
    }).then(r => r.json()).then(data => {
        if (data.error) { alert(data.error); return; }
        window.location.href = '{% url "codoc:definitions" %}';
    }).catch(err => alert('Delete failed: ' + err));
}

function saveDef(defId) {
    const form = document.getElementById('def-edit-form');
    const formData = new FormData(form);
    const url = defId
        ? '{% url "codoc:definition_edit" "00000000-0000-0000-0000-000000000000" %}'.replace('00000000-0000-0000-0000-000000000000', defId)
        : '{% url "codoc:definition_new" %}';

    fetch(url, { method: 'POST', body: formData })
        .then(r => {
            if (!r.ok) { throw new Error('HTTP ' + r.status); }
            return r.json();
        })
        .then(data => {
            if (data.error) { alert(data.error); return; }
            // Reload and select the saved definition
            const savedId = data.id;
            const params = new URLSearchParams(window.location.search);
            params.set('select', savedId);
            window.location.search = params.toString();
        })
        .catch(err => alert('Save failed: ' + err));
}
</script>
