<div style="padding:0.75rem">
    <h2 style="font-size:14px;margin-bottom:12px">{% if sp %}Edit System Prompt{% else %}New System Prompt{% endif %}</h2>

    <form id="sp-edit-form" onsubmit="return false;">
        {% csrf_token %}

        <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Name</label>
        <input type="text" name="name" required value="{{ sp.name|default:'' }}"
            style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);margin-bottom:12px">

        <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Description</label>
        <input type="text" name="description" value="{{ sp.data.description|default:'' }}"
            style="width:100%;font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);margin-bottom:12px">

        <label style="display:block;font-size:12px;color:var(--grey);margin-bottom:4px">Content</label>
        <textarea name="content" required
            style="width:100%;min-height:400px;font-family:inherit;font-size:13px;padding:10px;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text);resize:vertical;line-height:1.5;margin-bottom:12px">{{ sp.content|default:'' }}</textarea>

        <div style="display:flex;gap:8px">
            <button type="button" class="btn" onclick="saveSp('{{ sp.group_id|default:'' }}')">Save</button>
            <button type="button" class="btn" style="background:transparent;color:var(--grey);border:1px solid var(--border)" onclick="window.location.reload()">Cancel</button>
        </div>
    </form>
</div>

<script>
var _spCM = codocEditor(
    document.querySelector('#sp-edit-form textarea[name=content]'),
    function() { saveSp('{{ sp.group_id|default:"" }}'); },
    {minHeight: '400px', draftKey: 'codoc-draft-sp-{{ sp.group_id|default:"new" }}'}
);
function saveSp(groupId) {
    _spCM.save();
    const form = document.getElementById('sp-edit-form');
    const formData = new FormData(form);
    const url = '{% url "codoc:sysprompt_save_api" %}';
    if (groupId) formData.set('group_id', groupId);

    fetch(url, { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
            if (data.error) { alert(data.error); return; }
            if (_spCM._clearDraft) _spCM._clearDraft();
            window.location.href = '{% url "codoc:sysprompts" %}?id=' + (data.group_id || '');
        })
        .catch(err => alert('Save failed: ' + err));
}
</script>
